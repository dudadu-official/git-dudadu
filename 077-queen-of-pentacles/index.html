<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>두다두</title>
    <link href="../css/style.css" rel="stylesheet">
</head>

<body>
    <div id="wrap">
        <div class="cont_wrap">
            <header id="header">
                <h1><img src="./img/DUDADU_logo.png"></h1>
            </header>
            <div class="top_wrap">

                <div class="gif_glass">
                    <img src="./img/top_gif.gif" alt="gif 이미지">
                </div>
            </div>
            <img src="./img/light.png" alt="빛" class="light">
            <div class="cont">
                <h3 class="tit">주변까지 챙길 수 <br>
                    있는 <b>여유</b>가 있네유!!
                </h3>
                <div class="box_wrap">
                    <div class="box first">
                        <p class="box-tit">어른스러운 당신 멋지네유!</p>
                        <p class="box-txt">누군가에게 지금의 당신은<br>
                            집과도 같은 존재일 수 있어유!</p>
                    </div>
                    <div class="box second">
                        <div class="tag_wrap">
                            <div class="tag">
                                실용
                            </div>
                            <div class="tag">
                                지혜
                            </div>
                            <div class="tag">
                                배려
                            </div>
                            <div class="tag">
                                안정
                            </div>
                        </div>
                        <div class="box-txt">
                            <p>누군가에게 당신의 존재 자체만으로도
                                큰 힘과 위로가 되고 있어유!</p><br>

                            <p>작고 소박한 것에서 오는
                                만족을 놓치지 마세유.</p><br>

                            <p>당신이 머문 곳에는
                                언제나 따뜻한 온기가 남아있네유!</p>
                        </div>
                    </div>
                    <div class="video">
                        <iframe width="560" height="315"
                            src="https://www.youtube.com/embed/DxUWTi_CUoo?si=LGoraF2BWqBcxON0"
                            title="YouTube video player" frameborder="0"
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                            referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
                    </div>
                    <a href="https://www.instagram.com/dudadu_official/" class="btn_insta" target="_blank">
                        <p class="kor">두다두 인스타 계정 놀러가기</p>

                        <p class="eng">Visit Dudadu's Instagram</p>
                    </a>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
